services:
  # ── Laravel API (php artisan serve) ─────────────────────────────────────────
  app:
    build:
      context: .
      target: development
    ports:
      - "8088:8000"
    volumes:
      # Live-reload source changes without rebuilding the image
      - .:/var/www/html
      # Persist vendor across restarts without overwriting the host
      - vendor:/var/www/html/vendor
    env_file: .env
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8088
    depends_on: []

  # ── Vite dev server (React + HMR) ───────────────────────────────────────────
  vite:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5175:5173"
    volumes:
      - .:/app
      # Isolate node_modules inside the container
      - node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"

  # ── Production preview (nginx + php-fpm) ────────────────────────────────────
  # Run with: docker compose --profile prod up
  nginx:
    image: nginx:1.27-alpine
    profiles: [prod]
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - php_fpm

  php_fpm:
    build:
      context: .
      target: production
    profiles: [prod]
    volumes:
      - sqlite_data:/var/www/html/database
    env_file: .env.prod

volumes:
  vendor:
  node_modules:
  sqlite_data:
